<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logo.png">
    <title>Polytechnic Hub | Branch Wise Section</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Poppins for Modern UI, Kalam for Handwritten Notes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        handwriting: ['Kalam', 'cursive'],
                    },
                    colors: {
                        brand: {
                            dark: '#08142B',
                            notebook: '#fdfaf6',
                            inkBlue: '#1e3a8a',
                            inkRed: '#b91c1c'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #08142B;
            color: #ffffff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(30, 136, 229, 0.1) 0px, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(66, 165, 245, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* ---------------- View Transitions ---------------- */
        .view-layer {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
            transform: translateY(20px);
        }
        .view-layer.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* ---------------- Premium 3D Branch Cards ---------------- */
        .grid-container {
            perspective: 1000px;
        }
        .branch-card {
            transform-style: preserve-3d;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .branch-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }
        .branch-card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(-5deg);
            box-shadow: 15px 20px 40px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
            border-color: var(--hover-color, rgba(255,255,255,0.3));
        }
        .branch-card:hover::after {
            left: 200%;
        }
        .icon-container {
            transform: translateZ(40px);
            transition: transform 0.4s;
        }
        .branch-card:hover .icon-container {
            transform: translateZ(60px) scale(1.1);
        }
        .text-container {
            transform: translateZ(30px);
        }

        /* ---------------- Notebook Style UI ---------------- */
        .notebook-wrapper {
            background-color: #fdfaf6;
            border-radius: 8px 24px 24px 8px;
            box-shadow: 
                -15px 0 30px -10px rgba(0,0,0,0.5),
                inset 0 0 50px rgba(0,0,0,0.05);
            border-left: 12px solid #8b1e1e; /* Notebook Spine */
            position: relative;
            min-height: 80vh;
            color: #333;
            /* Ruled Paper Lines */
            background-image: repeating-linear-gradient(
                transparent, 
                transparent 39px, 
                #cbd5e1 39px, 
                #cbd5e1 40px
            );
            background-position: 0 40px;
        }
        
        /* Red Margin Line */
        .notebook-wrapper::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 60px;
            width: 2px;
            background-color: rgba(239, 68, 68, 0.4);
            z-index: 1;
        }
        .notebook-wrapper::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 64px;
            width: 1px;
            background-color: rgba(239, 68, 68, 0.2);
            z-index: 1;
        }

        .notebook-content {
            position: relative;
            z-index: 2;
            padding: 40px 40px 60px 85px; /* Offset for margin line */
        }

        .handwritten-text {
            font-family: 'Kalam', cursive;
            color: #1e3a8a; /* Blue Pen Ink */
            line-height: 40px; /* Matches the repeating gradient */
            font-size: 1.25rem;
            margin-bottom: 20px; /* Snap to lines */
        }
        
        .handwritten-heading {
            font-family: 'Kalam', cursive;
            color: #b91c1c; /* Red Pen Ink */
            line-height: 40px;
            margin-top: 40px;
            font-weight: bold;
        }

        /* Desk Background for Notebook View */
        .desk-bg {
            background: rgba(8, 20, 43, 0.6);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 768px) {
            .notebook-wrapper::before { left: 30px; }
            .notebook-wrapper::after { left: 34px; }
            .notebook-content { padding: 40px 20px 40px 45px; }
            .handwritten-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-500/30">

    <!-- Header -->
    <header class="fixed w-full top-0 z-50 bg-brand-dark/80 backdrop-blur-md border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-code-branch text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold tracking-wide text-white">POLYTECHNIC <span class="text-blue-400">HUB</span></h1>
            </div>
            <div class="hidden sm:block text-sm font-medium text-gray-400">
                <i class="fa-solid fa-book-open text-blue-400 mr-2"></i> Branch Wise Section
            </div>
        </div>
    </header>

    <main class="pt-28 pb-20 container mx-auto px-4 sm:px-6">

        <!-- ================= VIEW 1: BRANCH SELECTION GRID ================= -->
        <section id="branch-selection-view" class="view-layer active">
            <div class="text-center mb-16">
                <h2 class="text-3xl md:text-5xl font-bold mb-4">Select Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Branch</span></h2>
                <p class="text-gray-400 max-w-2xl mx-auto">Explore complete teacher-style handwritten notes and detailed information for all major Polytechnic Engineering branches.</p>
            </div>

            <!-- Dynamic Grid Container -->
            <div id="branch-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 grid-container">
                <!-- Cards injected via JS -->
            </div>
        </section>


        <!-- ================= VIEW 2: NOTEBOOK DETAILS ================= -->
        <section id="branch-detail-view" class="view-layer">
            
            <div class="mb-6 flex items-center justify-between desk-bg max-w-5xl mx-auto border-none !bg-transparent !p-0">
                <button id="back-btn" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 text-white px-5 py-2.5 rounded-xl transition-all border border-white/10 backdrop-blur-sm group">
                    <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                    Back to Branches
                </button>
                <div class="text-gray-400 text-sm hidden sm:block">
                    <i class="fa-solid fa-pen-fancy mr-2"></i> Teacher Notes Mode
                </div>
            </div>

            <div class="desk-bg max-w-5xl mx-auto shadow-2xl">
                <div class="notebook-wrapper">
                    <div id="notebook-content" class="notebook-content">
                        <!-- Handwritten Notes Injected Here via JS -->
                    </div>
                </div>
            </div>
            
        </section>

    </main>

    <!-- JavaScript Data and Logic -->
    <script>
        // Data Structure for all 15 Branches
        const branches = [
            { id: 1, name: "Electrical Engineering", icon: "fa-bolt", color: "rgba(250, 204, 21, 0.5)",
              what: "power generation, transmission networks, electrical machines, and circuitry", subjs: "Circuit Theory, Electrical Machines, Power Systems, Control Systems", labs: "Electrical machine operation, transformer diagnostics, circuit wiring, and soldering", p_jobs: "Tata Power, L&T, Siemens, Havells", g_jobs: "RRB JE, SSC JE, State Electricity Boards (UPPCL, BSPHCL)", future: "Exponential growth in Electric Vehicles (EV), Smart Grids, and Renewable Energy systems."
            },
            { id: 2, name: "Computer Science Engg.", icon: "fa-laptop-code", color: "rgba(30, 136, 229, 0.5)",
              what: "software engineering, computational algorithms, and computer architecture", subjs: "C/C++, Java, DBMS, Data Structures, Web Development", labs: "Algorithm implementation, full-stack web development, and database administration", p_jobs: "TCS, Infosys, Wipro, Tech Mahindra, Startups", g_jobs: "DRDO, ISRO, NIC, PSU IT departments", future: "High demand in Artificial Intelligence (AI), Machine Learning (ML), Web3, and Cloud Computing."

            { id: 12, name: "Electrical & Electronics", icon: "fa-plug", color: "rgba(217, 119, 6, 0.5)",
              what: "integration of high-voltage electrical systems and low-voltage electronic components", subjs: "Power Electronics, Microcontrollers, Machines", labs: "Power supply design and microcontroller-based motor automation", p_jobs: "Schneider Electric, ABB, Bosch", g_jobs: "Railways (S&T), State Electricity Boards", future: "Foundation of Smart Home automation and advanced power grid management."
            },
            { id: 13, name: "Electronics & Comm.", icon: "fa-satellite-dish", color: "rgba(236, 72, 153, 0.5)",
              what: "telecommunications, digital signal processing, and satellite networks", subjs: "Communication Systems, Antenna, Digital Signal Processing", labs: "Radio frequency (RF) analysis, antenna design, and signal modulation", p_jobs: "Jio, Airtel, Qualcomm, Ericsson", g_jobs: "BSNL, MTNL, ISRO, Prasar Bharati", future: "Critical dependency on 5G network expansion and emerging 6G technologies."
            },
            { id: 14, name: "Marine Engineering", icon: "fa-ship", color: "rgba(0, 194, 255, 0.5)",
              what: "propulsion systems, naval architecture, and maritime engineering operations", subjs: "Marine Engines, Naval Architecture, Ship construction", labs: "Engine room simulations and high-pressure pump maintenance", p_jobs: "Merchant Navy, Shipping companies (Maersk)", g_jobs: "Indian Navy (Technical), Port Trusts", future: "Steady global demand in maritime logistics and international shipping operations."
            },
            { id: 15, name: "Architecture Assistantship", icon: "fa-compass-drafting", color: "rgba(0, 194, 255, 0.5)",
              what: "architectural drafting, structural planning, and building design assistance", subjs: "Architectural Drawing, Building Material, AutoCAD", labs: "Traditional drafting board techniques and advanced 3D BIM modeling", p_jobs: "Architecture firms, Interior Design companies", g_jobs: "Town Planning department, Housing Boards", future: "Growing focus on sustainable architecture and modern eco-friendly interior design."
            }
        ];

        // Function to generate the teacher-style notes in formal technical English
        function generateTeacherNotes(branch) {
            return `
                <div class="text-center mb-8">
                    <h2 class="text-3xl md:text-5xl handwritten-heading border-b-2 border-red-300 pb-4 inline-block">${branch.name}</h2>
                    <p class="handwritten-text text-gray-500 mt-2">Comprehensive Academic & Technical Overview</p>
                </div>

                <h3 class="text-2xl md:text-3xl handwritten-heading">1. Branch Introduction</h3>
                <p class="handwritten-text">Welcome to the Polytechnic Hub academic module. This section provides a detailed technical analysis of <strong>${branch.name}</strong>. For students pursuing or considering this discipline, these notes outline the foundational principles and industrial scope of the sector.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">2. Branch Overview</h3>
                <p class="handwritten-text">In technical terms, this engineering branch primarily focuses on the study and application of <strong>${branch.what}</strong>. The curriculum is heavily weighted towards applied sciences and practical problem-solving methodologies.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">3. Academic & Industrial Significance</h3>
                <p class="handwritten-text">As global technological frameworks evolve, expertise in this sector remains indispensable. This branch is highly recommended for candidates possessing strong analytical skills and a desire to engineer practical solutions for complex real-world challenges.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">4. Core Curriculum Framework</h3>
                <p class="handwritten-text">Over the duration of the diploma, the syllabus mandates rigorous study of the following core disciplines:<br>
                📌 <strong>Major Subjects:</strong> ${branch.subjs}.<br>
                Mastery of these theoretical concepts is critical, as they form the foundation for advanced engineering applications.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">5. Laboratory & Practical Implementation</h3>
                <p class="handwritten-text">Technical education prioritizes experiential learning. The laboratory modules require active participation in:<br>
                🧪 <strong>Practical Training:</strong> ${branch.labs}.<br>
                Proficiency in these practical implementations is often a primary metric evaluated by industrial recruiters.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">6. Career Trajectory</h3>
                <p class="handwritten-text">Graduates possess three primary transitional pathways: integration into the public sector, recruitment into private enterprise, or lateral progression into higher academic programs (B.Tech). Industrial demand for certified technicians in this field remains consistently robust.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">7. Public Sector Opportunities</h3>
                <p class="handwritten-text">For candidates targeting governmental organizations, this discipline offers a substantial quota of technical vacancies across major state and central frameworks:<br>
                🏛️ <strong>Key Departments:</strong> ${branch.g_jobs}.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">8. Private Sector Opportunities</h3>
                <p class="handwritten-text">Candidates seeking immediate entry into the corporate ecosystem will find opportunities via campus placement drives and direct technical interviews.<br>
                🏢 <strong>Top Industry Recruiters:</strong> ${branch.p_jobs}.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">9. Technological Future Scope</h3>
                <p class="handwritten-text">The long-term viability of this specialization is highly secure due to continuous technological upgrades. <strong>${branch.future}</strong> Professionals must commit to continuous learning to align with these emerging industry paradigms.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">10. Higher Education Pathways</h3>
                <p class="handwritten-text">Diplomates seeking advanced theoretical knowledge may utilize the <strong>Lateral Entry (LEET)</strong> system to transition directly into the second year of a Bachelor of Technology (B.Tech) program, accelerating hierarchical and financial growth within the industry.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">11. Strategic Advantages</h3>
                <p class="handwritten-text">The primary advantage of this discipline is the immediate applicability of its core tenets to societal infrastructure and technological advancement. The specialized, hands-on expertise acquired provides a significant competitive edge in the technical labor market.</p>

                <h3 class="text-2xl md:text-3xl handwritten-heading">12. Key Directives for Undergraduates</h3>
                <p class="handwritten-text text-brand-inkRed font-bold">📢 Academic Advisory:<br></p>
                <p class="handwritten-text">1. Establish a strong conceptual foundation beginning in the first semester.<br>
                2. Prioritize skill acquisition and practical competency over mere academic memorization.<br>
                3. Maintain consistent engagement with faculty and actively participate in all laboratory sessions.<br><br>
                <strong>We wish you exceptional success in your engineering endeavors. 🌟</strong></p>
            `;
        }

        // DOM Elements
        const branchGrid = document.getElementById('branch-grid');
        const selectionView = document.getElementById('branch-selection-view');
        const detailView = document.getElementById('branch-detail-view');
        const notebookContent = document.getElementById('notebook-content');
        const backBtn = document.getElementById('back-btn');

        // 1. Render Branch Cards
        function renderBranches() {
            branches.forEach((branch, index) => {
                // Create Card Element
                const card = document.createElement('div');
                card.className = `branch-card`;
                card.style.setProperty('--hover-color', branch.color);
                card.style.animationDelay = `${index * 0.05}s`; // Staggered entrance
                
                card.innerHTML = `
                    <div class="flex flex-col items-center text-center">
                        <div class="icon-container w-20 h-20 rounded-2xl flex items-center justify-center mb-6 shadow-lg border" style="background: linear-gradient(135deg, ${branch.color}, transparent); border-color: ${branch.color}">
                            <i class="fa-solid ${branch.icon} text-4xl text-white drop-shadow-md"></i>
                        </div>
                        <div class="text-container">
                            <h3 class="text-lg font-bold text-gray-100">${branch.name}</h3>
                            <p class="text-xs text-gray-400 mt-2 flex items-center justify-center gap-1">
                                <i class="fa-solid fa-book-open text-blue-400"></i> Open Notes
                            </p>
                        </div>
                    </div>
                `;

                // Add Click Event to open details
                card.addEventListener('click', () => {
                    openBranchDetails(branch);
                });

                branchGrid.appendChild(card);
            });
        }

        // 2. Navigation Functions
        function openBranchDetails(branch) {
            // Populate content
            notebookContent.innerHTML = generateTeacherNotes(branch);
            
            // Switch Views
            selectionView.classList.remove('active');
            setTimeout(() => {
                selectionView.style.display = 'none';
                detailView.style.display = 'block';
                
                // Trigger reflow for animation
                void detailView.offsetWidth;
                detailView.classList.add('active');
                
                // Scroll to top of notebook smoothly
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 400); // Wait for fade out
        }

        function goBack() {
            detailView.classList.remove('active');
            setTimeout(() => {
                detailView.style.display = 'none';
                selectionView.style.display = 'block';
                
                void selectionView.offsetWidth;
                selectionView.classList.add('active');
            }, 400);
        }

        // Attach Event Listeners
        backBtn.addEventListener('click', goBack);

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderBranches();
        });

    </script>
</body>
</html>
